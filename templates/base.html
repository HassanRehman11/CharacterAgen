<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "AI Workflow" }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">AIVid Workflow</a>
        <div>
          <a class="navbar-text text-white me-3" href="{{ url_for('new_character') }}">Characters</a>
          <a class="navbar-text text-white me-3" href="{{ url_for('new_scene') }}">Scenes</a>
          <a class="navbar-text text-white" href="{{ url_for('new_video') }}">Videos</a>
        </div>
      </div>
    </nav>

    <div class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Add spinner functionality to all forms
      document.addEventListener('DOMContentLoaded', function() {
        const forms = document.querySelectorAll('form[method="post"]');
        forms.forEach(function(form) {
          const submitButton = form.querySelector('button[type="submit"]');
          if (submitButton) {
            // Store original button content
            const originalHTML = submitButton.innerHTML;
            const originalText = submitButton.textContent.trim();
            
            // Check if form has a confirm dialog
            const confirmMessage = form.getAttribute('data-confirm');
            
            form.addEventListener('submit', function(e) {
              // If form has confirm dialog, show it first
              if (confirmMessage) {
                if (!confirm(confirmMessage)) {
                  e.preventDefault();
                  return false;
                }
              }
              
              // Disable the submit button
              submitButton.disabled = true;
              
              // Determine button text based on action
              let processingText = 'Processing...';
              if (originalText.includes('Delete')) {
                processingText = 'Deleting...';
              } else if (originalText.includes('Generate')) {
                processingText = 'Generating...';
              } else if (originalText.includes('Save')) {
                processingText = 'Saving...';
              }
              
              // Add spinner to button
              submitButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>' + processingText;
              
              // If form validation fails, re-enable button
              setTimeout(function() {
                if (!form.checkValidity()) {
                  submitButton.disabled = false;
                  submitButton.innerHTML = originalHTML;
                }
              }, 100);
            });
          }
        });
      });
    </script>
  </body>
</html>
